<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Antikythera</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>Antikythera</h1>
    <nav>
      <a href="#" id="nav-skyview">Sky View</a>
      <a href="#" id="nav-browser">Event Browser</a>
    </nav>
  </header>

  <!-- Screen 1: Sky View -->
  <div id="screen-skyview">
    <div id="controls">
      <input type="date" id="date-input">
      <button id="submit-btn">Search</button>
    </div>
    <div id="main-layout">
      <div id="diagram-panel">
        <canvas id="solar-system" width="600" height="600"></canvas>
      </div>
      <div id="events-panel">
        <h2>Nearby Events</h2>
        <div id="events-list">
          <!-- TODO: Front End team renders event cards here -->
        </div>
      </div>
    </div>
  </div>

  <!-- Screen 2: Event Browser -->
  <div id="screen-browser" style="display:none;">
    <input type="text" id="search-input" placeholder="Search events...">
    <div id="filters">
      <select id="filter-type"><option>All Types</option></select>
      <select id="filter-planet"><option>All Planets</option></select>
    </div>
    <table id="events-table">
      <thead>
        <tr>
          <th>Date</th>
          <th>Event</th>
          <th>Planets</th>
          <th>Type</th>
        </tr>
      </thead>
      <tbody id="events-table-body">
        <!-- TODO: Front End team renders rows here -->
      </tbody>
    </table>
  </div>

  <script src="diagram.js"></script>
  <script src="app.js"></script>
</body>
</html>
